<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireguard 확장 프로그램 테스트</title>
    <link rel="icon" href="/app/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/chrome-extension/content.css" />
    <style>
      body {
        margin: 0;
        padding: 48px;
        color: #172036;
        background: #f2f4f8;
        font-family: Arial, sans-serif;
      }

      .fake-order {
        width: 520px;
        padding: 28px;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 12px 30px rgb(26 39 68 / 12%);
      }

      .fake-order__tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
      }

      .fake-order label {
        display: grid;
        gap: 6px;
        margin: 12px 0;
      }

      .fake-order input {
        height: 40px;
        padding: 0 12px;
      }

      .fake-order__actions {
        display: flex;
        gap: 8px;
        margin-top: 18px;
      }
    </style>
  </head>
  <body>
    <article class="fake-order" aria-label="가상 Upbit 주문 화면">
      <h1>KRW-BTC 주문</h1>
      <div class="fake-order__tabs" role="tablist" aria-label="주문 방향">
        <button
          id="test-side-buy"
          type="button"
          role="tab"
          aria-selected="true"
        >
          매수
        </button>
        <button
          id="test-side-sell"
          type="button"
          role="tab"
          aria-selected="false"
        >
          매도
        </button>
      </div>
      <div class="fake-order__tabs" role="tablist" aria-label="주문 유형">
        <button type="button" role="tab" aria-selected="true">지정가</button>
        <button type="button" role="tab" aria-selected="false">시장가</button>
      </div>
      <label>
        매수가격
        <input id="test-price" value="82000000" />
      </label>
      <label>
        주문수량
        <input id="test-volume" value="0.01" />
      </label>
      <label>
        주문총액
        <input id="test-amount" value="820000" />
      </label>
      <div class="fake-order__actions">
        <button id="test-max" type="button">최대</button>
        <button
          id="test-buy"
          type="button"
          data-saltbread-order-action="BUY"
        >
          매수하기
        </button>
        <button
          id="test-sell"
          type="button"
          data-saltbread-order-action="SELL"
        >
          매도하기
        </button>
        <button id="test-demo-scenario" type="button">
          데모 시나리오 이벤트
        </button>
        <button id="test-detect-now" type="button">즉시 감지 이벤트</button>
        <button id="test-demo-reset" type="button">데모 초기화 이벤트</button>
      </div>
      <output id="test-event-status" aria-live="polite"></output>
    </article>

    <script src="/tests/extension-harness.js"></script>
    <script src="/chrome-extension/config.js"></script>
    <script src="/chrome-extension/flame-animation.js"></script>
    <script src="/chrome-extension/data-core.js"></script>
    <script src="/chrome-extension/content.js"></script>
  </body>
</html>
