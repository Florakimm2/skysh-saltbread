<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireguard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <div id="popup-flame" class="brand__flame"></div>
        <div>
          <p class="brand__eyebrow">CHROME EXTENSION</p>
          <h1>Fireguard</h1>
        </div>
      </header>

      <section id="auth-view" class="card">
        <div class="tabs" role="tablist" aria-label="인증 방식">
          <button
            id="login-tab"
            class="tab is-active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="login-form"
          >
            로그인
          </button>
          <button
            id="signup-tab"
            class="tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="signup-form"
          >
            회원가입
          </button>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <div class="form-heading">
            <h2>다시 오신 것을 환영해요</h2>
            <p>계정 정보를 입력해 로그인하세요.</p>
          </div>

          <label for="login-email">이메일</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="user@example.com"
            required
          />

          <label for="login-password">비밀번호</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="비밀번호 입력"
            required
          />

          <p class="message" aria-live="polite"></p>
          <button class="primary-button" type="submit">로그인</button>
        </form>

        <form id="signup-form" class="auth-form" hidden novalidate>
          <div class="form-heading">
            <h2>새 계정 만들기</h2>
            <p>Fireguard를 시작할 정보를 입력하세요.</p>
          </div>

          <label for="signup-name">이름</label>
          <input
            id="signup-name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="홍길동"
            required
          />

          <label for="signup-email">이메일</label>
          <input
            id="signup-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="user@example.com"
            required
          />

          <label for="signup-password">비밀번호</label>
          <input
            id="signup-password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호 입력"
            minlength="8"
            required
          />

          <p class="message" aria-live="polite"></p>
          <button class="primary-button" type="submit">회원가입</button>
        </form>
      </section>

      <section id="account-view" class="card account-card" hidden>
        <span class="status-badge">인증됨</span>
        <p class="account-card__label">로그인 계정</p>
        <h2 id="account-name"></h2>
        <p id="account-email" class="account-card__email"></p>
        <p class="account-card__description">
          Fireguard 확장 프로그램을 사용할 준비가 되었습니다.
        </p>

        <section class="api-key-section" aria-labelledby="api-key-title">
          <div class="api-key-section__heading">
            <div>
              <p class="account-card__label">Upbit 연동</p>
              <h3 id="api-key-title">읽기 전용 API 키</h3>
            </div>
            <span id="api-key-status" class="api-key-status">확인 중</span>
          </div>
          <p class="api-key-section__description">
            키는 로컬 암호화 비밀번호로 AES-GCM 암호화되어 이 브라우저에만
            저장됩니다.
          </p>

          <form id="api-key-form" class="api-key-form">
            <label for="upbit-access-key">Access Key</label>
            <input
              id="upbit-access-key"
              name="accessKey"
              type="password"
              autocomplete="off"
              placeholder="Upbit Access Key"
            />

            <label for="upbit-secret-key">Secret Key</label>
            <input
              id="upbit-secret-key"
              name="secretKey"
              type="password"
              autocomplete="off"
              placeholder="Upbit Secret Key"
            />

            <label for="api-passphrase">로컬 암호화 비밀번호</label>
            <input
              id="api-passphrase"
              name="passphrase"
              type="password"
              autocomplete="off"
              minlength="8"
              placeholder="8자 이상"
              required
            />

            <p id="api-key-message" class="message" aria-live="polite"></p>
            <div class="api-key-actions">
              <button id="save-api-key-button" class="primary-button" type="submit">
                암호화 저장
              </button>
              <button
                id="unlock-api-key-button"
                class="secondary-button"
                type="button"
                hidden
              >
                잠금 해제
              </button>
              <button
                id="delete-api-key-button"
                class="danger-button"
                type="button"
                hidden
              >
                저장 키 삭제
              </button>
            </div>
          </form>
        </section>

        <p id="account-message" class="message" aria-live="polite"></p>
        <button id="logout-button" class="secondary-button" type="button">
          로그아웃
        </button>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="cute-idle-flame.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
