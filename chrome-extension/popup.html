<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireguard</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section id="signed-out-view" class="signed-out-view">
        <img
          class="signed-out-view__icon"
          src="icon-128.png"
          alt="Fireguard 서비스 아이콘"
          width="80"
          height="80"
        />
        <h1>Fireguard</h1>
        <button id="open-login-button" class="primary-button" type="button">
          로그인 / 회원가입
        </button>
        <p id="login-message" class="message" aria-live="polite"></p>
      </section>

      <section id="account-view" class="account-view" hidden>
        <header class="account-header">
          <div class="account-header__brand">
            <img src="icon-48.png" alt="" width="38" height="38" />
            <span>Fireguard</span>
          </div>
          <span class="status-badge">계정 인증 완료</span>
        </header>

        <h1 id="account-greeting" class="account-greeting"></h1>

        <section class="summary-card" aria-labelledby="summary-title">
          <p class="card-eyebrow">MY FIREGUARD</p>
          <h2 id="summary-title">오늘까지 쌓인 기록</h2>
          <p id="statistics-summary" class="summary-card__message"></p>
        </section>

        <section class="integration-card" aria-labelledby="api-key-title">
          <button
            id="api-key-toggle"
            class="integration-card__toggle"
            type="button"
            aria-expanded="false"
            aria-controls="api-key-details"
          >
            <span class="integration-card__copy">
              <span class="card-eyebrow">UPBIT OPEN API</span>
              <strong id="api-key-title">API를 연결해 더 정확하게 탐지해요</strong>
            </span>
            <span class="integration-card__meta">
              <span id="api-key-status" class="api-key-status">확인 중</span>
              <span class="integration-card__chevron" aria-hidden="true"></span>
            </span>
          </button>

          <div id="api-key-details" class="integration-card__details" hidden>
            <p class="integration-card__description">
              자산 및 주문 조회 권한을 확인한 뒤 API 키를 암호화해 저장합니다.
              주문이나 출금 권한은 필요하지 않습니다.
            </p>
            <p class="local-storage-note">
              API 키는 로컬에서 암호화되어 이 브라우저에만 저장되니 안심하세요.
            </p>

            <form id="api-key-form" class="api-key-form">
              <label for="upbit-access-key">Access Key</label>
              <input
                id="upbit-access-key"
                name="accessKey"
                type="password"
                autocomplete="off"
                placeholder="업비트 API Access Key"
              />

              <label for="upbit-secret-key">Secret Key</label>
              <input
                id="upbit-secret-key"
                name="secretKey"
                type="password"
                autocomplete="off"
                placeholder="업비트 API Secret Key"
              />

              <label for="api-passphrase">로컬 암호화 비밀번호</label>
              <input
                id="api-passphrase"
                name="passphrase"
                type="password"
                autocomplete="off"
                minlength="8"
                placeholder="8자 이상 입력"
                required
              />

              <p id="api-key-message" class="message" aria-live="polite"></p>
              <div class="api-key-actions">
                <button
                  id="save-api-key-button"
                  class="primary-button"
                  type="submit"
                >
                  검증 후 암호화 저장
                </button>
                <button
                  id="unlock-api-key-button"
                  class="secondary-button"
                  type="button"
                  hidden
                >
                  잠금 해제
                </button>
                <button
                  id="delete-api-key-button"
                  class="danger-button"
                  type="button"
                  hidden
                >
                  저장 키 삭제
                </button>
              </div>
            </form>
          </div>
        </section>

        <p id="account-message" class="message" aria-live="polite"></p>
        <button id="logout-button" class="logout-button" type="button">
          로그아웃
        </button>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
