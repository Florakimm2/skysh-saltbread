<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saltbread</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <div class="brand__mark" aria-hidden="true">S</div>
        <div>
          <p class="brand__eyebrow">CHROME EXTENSION</p>
          <h1>Saltbread</h1>
        </div>
      </header>

      <section id="auth-view" class="card">
        <div class="tabs" role="tablist" aria-label="인증 방식">
          <button
            id="login-tab"
            class="tab is-active"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="login-form"
          >
            로그인
          </button>
          <button
            id="signup-tab"
            class="tab"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="signup-form"
          >
            회원가입
          </button>
        </div>

        <form id="login-form" class="auth-form" novalidate>
          <div class="form-heading">
            <h2>다시 오신 것을 환영해요</h2>
            <p>계정 정보를 입력해 로그인하세요.</p>
          </div>

          <label for="login-email">이메일</label>
          <input
            id="login-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="user@example.com"
            required
          />

          <label for="login-password">비밀번호</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="비밀번호 입력"
            required
          />

          <p class="message" aria-live="polite"></p>
          <button class="primary-button" type="submit">로그인</button>
        </form>

        <form id="signup-form" class="auth-form" hidden novalidate>
          <div class="form-heading">
            <h2>새 계정 만들기</h2>
            <p>Saltbread를 시작할 정보를 입력하세요.</p>
          </div>

          <label for="signup-name">이름</label>
          <input
            id="signup-name"
            name="name"
            type="text"
            autocomplete="name"
            placeholder="홍길동"
            required
          />

          <label for="signup-email">이메일</label>
          <input
            id="signup-email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="user@example.com"
            required
          />

          <label for="signup-password">비밀번호</label>
          <input
            id="signup-password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호 입력"
            minlength="8"
            required
          />

          <p class="message" aria-live="polite"></p>
          <button class="primary-button" type="submit">회원가입</button>
        </form>
      </section>

      <section id="account-view" class="card account-card" hidden>
        <span class="status-badge">인증됨</span>
        <p class="account-card__label">로그인 계정</p>
        <h2 id="account-name"></h2>
        <p id="account-email" class="account-card__email"></p>
        <p class="account-card__description">
          Saltbread 확장 프로그램을 사용할 준비가 되었습니다.
        </p>
        <p id="account-message" class="message" aria-live="polite"></p>
        <button id="logout-button" class="secondary-button" type="button">
          로그아웃
        </button>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
